name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pull any missing built-in site icons into public/icons/ (only fetches
      # ones not already committed; never overwrites manual overrides). Failures
      # are non-fatal — the committed icons (and the letter-avatar fallback in
      # the UI) cover anything that doesn't download.
      - name: Fetch icons
        run: pnpm fetch-icons
        continue-on-error: true

      # `pnpm build` runs `prebuild` (sync-icons → applies icons-override/ and
      # regenerates src/config/icon-overrides.ts) before `tsc -b && vite build`,
      # so it must come AFTER fetch-icons. CDN detection (src/config/cdn-detected.ts)
      # is refreshed by the scheduled refresh-cdn workflow, not here.
      - name: Build
        run: pnpm build

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # default command is `deploy`, which uploads ./dist per wrangler.toml